services:
  - type: web
    name: spice-garden-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: spice-garden-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # You will need to manually set this in the Render Dashboard after deploying Vercel

databases:
  - name: spice-garden-db
    plan: free
    databaseName: spice_garden
    user: admin
